<!DOCTYPE html>
<html>
<head>

<title>Cold Chain Dashboard</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

.card {
    background: white;
    margin: 10px auto;
    padding: 10px;
    width: 250px;
    border-radius: 10px;
    box-shadow: 0px 2px 6px rgba(0,0,0,0.2);
}
#alertBox {
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.5; }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
</body>
<h1>🧊 Cold Chain Dashboard</h1>
<div id="alertBox" style="display:none; background:red; color:white; padding:10px; margin:10px; font-weight:bold; border-radius:8px;">
⚠️ HIGH RISK ALERT: Spoilage Likely!
</div>


<div class="card">🌡️ Temperature: <span id="temp">--</span></div>
<div class="card">💧 Humidity: <span id="humidity">--</span></div>
<div class="card">⚠️ Risk: <span id="risk">--</span></div>
<div class="card">🧠 Prediction: <span id="prediction">--</span></div>
<div class="card">💰 Loss: <span id="loss">--</span></div>

<h3>📈 Live Trend</h3>
<canvas id="trendChart"></canvas>


<script>
const ctx = document.getElementById('trendChart');

let tempData = [];
let humidityData = [];
let labels = [];

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [
            {
                label: 'Temperature (°C)',
                data: tempData,
                borderWidth: 2
            },
            {
                label: 'Humidity (%)',
                data: humidityData,
                borderWidth: 2
            }
        ]
    },
    options: {
        responsive: true,
        animation: false
    }
});

function updateData() {
    fetch('/data')
    .then(res => res.json())
    .then(data => {

        document.getElementById("temp").innerText = data.temp;
        document.getElementById("humidity").innerText = data.humidity;
        document.getElementById("risk").innerText = data.risk;
        document.getElementById("prediction").innerText = data.prediction;
        document.getElementById("loss").innerText = data.loss;
        if (data.risk.includes("HIGH")) {
    document.getElementById("alertBox").style.display = "block";
} else {
    document.getElementById("alertBox").style.display = "none";
}

        if (labels.length > 10) {
            labels.shift();
            tempData.shift();
            humidityData.shift();
        }

        labels.push("");
        tempData.push(data.temp);
        humidityData.push(data.humidity);

        chart.update();
    })
    .catch(err => console.log(err));
}

setInterval(updateData, 5000);
updateData();
</script>

</body>
</html>
